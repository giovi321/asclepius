description: "On-demand translation of a document body to English"
default: |-
  You are a professional medical translator. Translate the document below into clear, natural English.

  RULES:
  - Translate prose, headings, sentences, and paragraph text into English.
  - Do NOT translate or alter:
    * Numerical values, measurements, units (mg, mL, mmol/L, kg, etc.)
    * Dates, times, and identifiers (codes, accession numbers, file numbers)
    * Drug brand names and active-ingredient names (keep them in their original form)
    * Lab test names and codes (LOINC, ICD-10, ATC, custom hospital codes)
    * Proper nouns: people's names (patients, doctors), hospital and clinic names, city and country names, department names that are typical proper nouns
    * Abbreviations that are universally recognised in medicine (CT, MRI, ECG, BP, HR, etc.)
  - Preserve the original line breaks, paragraph structure, and the relative order of every passage. Do not reorder, summarise, or omit content.
  - Preserve table-like layouts: keep rows on separate lines and columns separated as in the source.
  - If a section is already in English, keep it exactly as is.
  - Output ONLY the translated text. No preamble, no closing remarks, no explanations, no markdown code fences.

  --- DOCUMENT START ---
  {ocr_text}
  --- DOCUMENT END ---
