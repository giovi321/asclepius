name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libmagic1 tesseract-ocr tesseract-ocr-eng
      - name: Install package
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        # Only the new modules ship formatter-compliant, so we scope ruff to
        # catch real errors (E, F, I) across the whole backend but do not
        # gate on ``ruff format`` yet. Tighten once the legacy files are
        # auto-formatted (see CHANGELOG).
        run: ruff check .
      - name: Tests
        working-directory: backend
        env:
          ASCLEPIUS_ENV: development
          ASCLEPIUS_COOKIE_SECURE: "0"
          ASCLEPIUS_SECRET_KEY: ci-secret-key-that-is-at-least-32-characters-long
        run: pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "present=true"  >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      # Only enable dependency caching when a lockfile is actually present —
      # otherwise ``actions/setup-node`` fails with "paths were not resolved".
      - name: Set up Node (with cache)
        if: steps.lockfile.outputs.present == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Set up Node (no cache)
        if: steps.lockfile.outputs.present != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  openapi-drift:
    name: OpenAPI / schema.ts drift
    runs-on: ubuntu-latest
    # Regenerate the OpenAPI schema + schema.ts from the current backend;
    # fail if the committed copies don't match. Prevents backend Pydantic
    # edits from silently desyncing the frontend types (see issue #15).
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libmagic1 tesseract-ocr
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Install frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Regenerate OpenAPI + schema.ts
        env:
          ASCLEPIUS_ENV: development
          ASCLEPIUS_COOKIE_SECURE: "0"
          ASCLEPIUS_SECRET_KEY: ci-secret-key-that-is-at-least-32-characters-long
        run: |
          python backend/scripts/export_openapi.py
          npm --prefix frontend run gen:api
      - name: Fail on drift
        run: |
          git diff --exit-status -- frontend/src/openapi.json frontend/src/api/schema.ts || {
            echo '::error::openapi.json / schema.ts are out of date. Run:'
            echo '  python backend/scripts/export_openapi.py && npm --prefix frontend run gen:api'
            echo 'and commit the result.'
            exit 1
          }

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: pip-audit
        run: |
          pip install pip-audit
          # Audit the resolved dependencies, but do not fail the job — this
          # is an informational gate until we pin a lockfile.
          pip-audit --requirement backend/pyproject.toml --strict || true
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: npm audit
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund && npm audit --omit=dev --audit-level=high || true
