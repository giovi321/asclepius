<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Asclepius — Vault Structure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#faf7f2; --ink:#1c1917; --muted:#57534e; --soft:#78716c;
    --rule:rgba(28,25,23,0.12);
    --accent:#8E4449; --accent-tint:rgba(142,68,73,0.10);
  }
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:'Geist',sans-serif;}
  .wrap{max-width:980px;margin:2rem auto;padding:0 1.25rem;}
  .eyebrow{font-family:'Geist Mono',monospace;font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft);margin:0 0 0.4rem;}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:1.75rem;margin:0 0 0.25rem;letter-spacing:-0.01em;}
  .sub{color:var(--muted);font-size:0.92rem;margin:0 0 1.25rem;}
  .frame{background:#efeee5;border:1px solid var(--rule);border-radius:8px;overflow-x:auto;}
  .frame svg{display:block;width:100%;height:auto;}
  footer{margin-top:1rem;font-family:'Geist Mono',monospace;font-size:9px;color:var(--soft);border-top:1px solid var(--rule);padding-top:0.5rem;letter-spacing:0.06em;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">VAULT / FILESYSTEM LAYOUT</p>
  <h1>Files move once: from inbox to a patient's year</h1>
  <p class="sub">Three top-level zones — landing, organized records, and a holding bay for documents the pipeline couldn't place.</p>

  <div class="frame">
  <svg viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vault structure tree">
    <defs>
      <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
      </pattern>
      <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#8E4449"/>
      </marker>
    </defs>
    <rect width="100%" height="100%" fill="#efeee5"/>
    <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

    <!-- ===== Tree connectors (drawn first) ===== -->
    <!-- Root vault -->
    <line x1="120" y1="100" x2="120" y2="500" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
    <!-- Branches off root -->
    <line x1="120" y1="140" x2="160" y2="140" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
    <line x1="120" y1="240" x2="160" y2="240" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
    <line x1="120" y1="440" x2="160" y2="440" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>
    <line x1="120" y1="500" x2="160" y2="500" stroke="rgba(28,25,23,0.25)" stroke-width="1"/>

    <!-- Inbox sub-branch -->
    <line x1="200" y1="160" x2="200" y2="200" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
    <line x1="200" y1="184" x2="240" y2="184" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
    <!-- patients sub-branches -->
    <line x1="200" y1="260" x2="200" y2="412" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
    <line x1="200" y1="284" x2="240" y2="284" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
    <line x1="200" y1="332" x2="240" y2="332" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
    <line x1="200" y1="380" x2="240" y2="380" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>
    <!-- year sub-branch (events + flat) -->
    <line x1="280" y1="304" x2="280" y2="356" stroke="rgba(28,25,23,0.18)" stroke-width="0.8"/>
    <line x1="280" y1="332" x2="320" y2="332" stroke="rgba(28,25,23,0.18)" stroke-width="0.8"/>
    <line x1="280" y1="356" x2="320" y2="356" stroke="rgba(28,25,23,0.18)" stroke-width="0.8"/>
    <!-- unclassified branch -->
    <line x1="200" y1="460" x2="240" y2="460" stroke="rgba(28,25,23,0.20)" stroke-width="0.8"/>

    <!-- ===== File-flow accent arrow (inbox -> patients) ===== -->
    <path d="M 540 184 C 700 184, 700 332, 540 332" fill="none" stroke="#8E4449" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>
    <rect x="660" y="240" width="120" height="14" rx="2" fill="#efeee5"/>
    <text x="720" y="250" font-family="'Geist Mono',monospace" font-size="8" fill="#8E4449" text-anchor="middle" letter-spacing="0.06em">PIPELINE MOVES ONCE</text>

    <!-- ===== Nodes ===== -->
    <!-- vault/ root -->
    <rect x="60" y="80" width="120" height="40" rx="6" fill="#faf7f2"/>
    <rect x="60" y="80" width="120" height="40" rx="6" fill="rgba(142,68,73,0.10)" stroke="#8E4449" stroke-width="1.2"/>
    <text x="120" y="98" font-family="'Geist Mono',monospace" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">vault/</text>
    <text x="120" y="111" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">root volume</text>

    <!-- inbox/ -->
    <rect x="160" y="120" width="160" height="40" rx="6" fill="#faf7f2"/>
    <rect x="160" y="120" width="160" height="40" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <text x="240" y="138" font-family="'Geist Mono',monospace" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">inbox/</text>
    <text x="240" y="151" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">drop zone</text>

    <!-- inbox/user-1/ -->
    <rect x="240" y="172" width="200" height="32" rx="6" fill="#faf7f2"/>
    <rect x="240" y="172" width="200" height="32" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
    <text x="340" y="192" font-family="'Geist Mono',monospace" font-size="11" fill="#1c1917" text-anchor="middle">user-&lt;id&gt;/   per-user dropzone</text>

    <!-- patients/ -->
    <rect x="160" y="220" width="160" height="40" rx="6" fill="#faf7f2"/>
    <rect x="160" y="220" width="160" height="40" rx="6" fill="rgba(142,68,73,0.10)" stroke="#8E4449" stroke-width="1.2"/>
    <text x="240" y="238" font-family="'Geist Mono',monospace" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">patients/</text>
    <text x="240" y="251" font-family="'Geist Mono',monospace" font-size="9" fill="#8E4449" text-anchor="middle">organized records</text>

    <!-- patient slug -->
    <rect x="240" y="272" width="180" height="28" rx="6" fill="#faf7f2"/>
    <rect x="240" y="272" width="180" height="28" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <text x="330" y="289" font-family="'Geist Mono',monospace" font-size="11" fill="#1c1917" text-anchor="middle">{patient-slug}/</text>

    <!-- year -->
    <rect x="320" y="318" width="80" height="28" rx="6" fill="#faf7f2"/>
    <rect x="320" y="318" width="80" height="28" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <text x="360" y="335" font-family="'Geist Mono',monospace" font-size="11" fill="#1c1917" text-anchor="middle">{year}/</text>

    <!-- event subfolder -->
    <rect x="408" y="318" width="180" height="28" rx="6" fill="#faf7f2"/>
    <rect x="408" y="318" width="180" height="28" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
    <text x="498" y="335" font-family="'Geist Mono',monospace" font-size="11" fill="#1c1917" text-anchor="middle">{medical-event-slug}/</text>

    <!-- file -->
    <rect x="408" y="346" width="320" height="32" rx="6" fill="#faf7f2"/>
    <rect x="408" y="346" width="320" height="32" rx="6" fill="rgba(142,68,73,0.10)" stroke="#8E4449" stroke-width="1.2"/>
    <text x="568" y="367" font-family="'Geist Mono',monospace" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">{YYYYMMDD}_{provider}_{doctype}.pdf</text>

    <!-- imaging dicom -->
    <rect x="240" y="394" width="240" height="32" rx="6" fill="#faf7f2"/>
    <rect x="240" y="394" width="240" height="32" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
    <text x="360" y="414" font-family="'Geist Mono',monospace" font-size="11" fill="#1c1917" text-anchor="middle">imaging/{study}/series-NNN/*.dcm</text>

    <!-- unclassified/ -->
    <rect x="160" y="420" width="160" height="40" rx="6" fill="#faf7f2"/>
    <rect x="160" y="420" width="160" height="40" rx="6" fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="240" y="438" font-family="'Geist Mono',monospace" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">unclassified/</text>
    <text x="240" y="451" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">no patient resolved</text>

    <!-- asclepius.sqlite -->
    <rect x="160" y="480" width="220" height="40" rx="6" fill="#faf7f2"/>
    <rect x="160" y="480" width="220" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
    <rect x="168" y="486" width="40" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.40)" stroke-width="0.8"/>
    <text x="188" y="495" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(87,83,78,0.9)" text-anchor="middle" letter-spacing="0.08em">DB</text>
    <text x="270" y="510" font-family="'Geist Mono',monospace" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">asclepius.sqlite</text>

    <!-- ===== Naming convention callout ===== -->
    <line x1="60" y1="540" x2="860" y2="540" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
    <text x="60" y="558" font-family="'Geist Mono',monospace" font-size="8" letter-spacing="0.14em" fill="#57534e">EXAMPLE</text>
    <text x="160" y="558" font-family="'Geist Mono',monospace" font-size="10" fill="#1c1917">vault/patients/giovanni-crapelli/2024/knee-injury/20240722_clinica-luganese_radiology-report.pdf</text>
  </svg>
  </div>

  <footer>ASCLEPIUS · VAULT · 2026-04-22</footer>
</div>
</body>
</html>
