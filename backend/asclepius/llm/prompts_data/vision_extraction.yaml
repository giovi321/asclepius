description: "Vision-LLM flow: single-step image -> OCR + classification + metadata"
default: |-
  Look at this medical document image carefully. First, read ALL the text you can see. Then classify the document.

  IMPORTANT: Respond with ONLY this exact JSON structure. No markdown, no extra keys.

  {
    "ocr_text": "ALL text you can read from the document, preserving structure",
    "patient_name": "string or null",
    "doc_type": "invoice|prescription|specialist_report|surgical_report|discharge|lab_test|vaccination|medical_certificate|imaging_report|other",
    "event_date": "YYYY-MM-DD or null (when the medical event/visit actually happened)",
    "issued_date": "YYYY-MM-DD or null (when the document was issued/printed)",
    "language_detected": "ISO 639-1 code",
    "doctor": { "name": "string or null", "title": "string or null", "specialty_original": "string or null" },
    "facility": { "name": "string or null", "type": "hospital|clinic|lab|pharmacy|other|null", "address": "string or null", "city": "string or null" },
    "summary_en": "1-3 sentence English summary focused on what the document is and its core clinical content (type of exam/procedure, key findings, medications, diagnoses). DO NOT repeat patient name, date of birth, facility/hospital, doctor name, or dates - those are already captured in their own fields.",
    "summary_original": "Same content as summary_en but in the document's source language. DO NOT repeat patient identifiers, facility, doctor, or dates."
  }
