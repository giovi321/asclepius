repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=200"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, css, json, yaml, markdown]
        exclude: ^(docs/|CHANGELOG\.md$)

  # Regenerate the OpenAPI schema + frontend schema.ts whenever a backend
  # Python file changes, and stage the regenerated artefacts. Mirrored by
  # the openapi-drift CI job so the check is authoritative even if a
  # contributor skips the hook (see issue #15).
  #
  # If the regen produces a diff, pre-commit auto-stages the new artefacts
  # and aborts the commit with a "files were modified by this hook"
  # message. Re-running ``git commit`` will then succeed with the
  # regenerated openapi.json / schema.ts included — no manual regen step.
  #
  # Env vars mirror the CI workflow's "Regenerate OpenAPI" step: a
  # placeholder secret long enough to pass the production-config validator,
  # plus ``ASCLEPIUS_ENV=development`` so cookie-secure / TLS checks don't
  # fire when the schema export imports ``main.create_app``.
  - repo: local
    hooks:
      - id: openapi-drift
        name: OpenAPI / schema.ts drift
        language: system
        entry: bash -c 'ASCLEPIUS_ENV=development ASCLEPIUS_COOKIE_SECURE=0 ASCLEPIUS_SECRET_KEY=pre-commit-hook-placeholder-secret-not-for-production-use python backend/scripts/export_openapi.py && npm --prefix frontend run gen:api && npx --prefix frontend prettier --write frontend/src/openapi.json frontend/src/api/schema.ts && git add frontend/src/openapi.json frontend/src/api/schema.ts'
        files: ^backend/.*\.py$
        pass_filenames: false
