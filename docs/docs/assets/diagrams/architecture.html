<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Asclepius — Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#faf7f2;
    --paper-2:#f2ede4;
    --ink:#1c1917;
    --muted:#57534e;
    --soft:#78716c;
    --rule:rgba(28,25,23,0.12);
    --accent:#8E4449;
    --accent-tint:rgba(142,68,73,0.10);
    --link:#2563eb;
  }
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:'Geist',sans-serif;}
  .wrap{max-width:980px;margin:2rem auto;padding:0 1.25rem;}
  .eyebrow{font-family:'Geist Mono',monospace;font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft);margin:0 0 0.4rem;}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:1.75rem;margin:0 0 0.25rem;letter-spacing:-0.01em;}
  .sub{color:var(--muted);font-size:0.92rem;margin:0 0 1.25rem;}
  .frame{background:#efeee5;border:1px solid var(--rule);border-radius:8px;overflow-x:auto;}
  .frame svg{display:block;width:100%;height:auto;}
  footer{margin-top:1rem;font-family:'Geist Mono',monospace;font-size:9px;color:var(--soft);border-top:1px solid var(--rule);padding-top:0.5rem;letter-spacing:0.06em;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">ARCHITECTURE / SYSTEM OVERVIEW</p>
  <h1>One container in the middle, your LLMs on the side</h1>
  <p class="sub">A FastAPI backend serves the React UI and runs a background pipeline. OCR and LLM work happen on services you bring yourself.</p>

  <div class="frame">
  <svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Asclepius architecture diagram">
    <defs>
      <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
      </pattern>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
      </marker>
      <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#8E4449"/>
      </marker>
      <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
      </marker>
    </defs>

    <rect width="100%" height="100%" fill="#efeee5"/>
    <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

    <!-- ===== Group labels ===== -->
    <text x="80" y="60" font-family="'Geist Mono',monospace" font-size="8" letter-spacing="0.18em" fill="#78716c">CLIENT</text>
    <text x="280" y="60" font-family="'Geist Mono',monospace" font-size="8" letter-spacing="0.18em" fill="#78716c">DOCKER CONTAINER</text>
    <text x="720" y="60" font-family="'Geist Mono',monospace" font-size="8" letter-spacing="0.18em" fill="#78716c">EXTERNAL</text>

    <!-- Container boundary -->
    <rect x="240" y="76" width="436" height="332" rx="8" fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- ===== ARROWS first (z-order) ===== -->
    <!-- Browser -> API -->
    <line x1="208" y1="160" x2="296" y2="160" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    <!-- API -> DB -->
    <line x1="408" y1="200" x2="408" y2="248" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    <!-- API -> Pipeline -->
    <line x1="448" y1="180" x2="552" y2="180" stroke="#8E4449" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
    <!-- Pipeline -> DB -->
    <line x1="592" y1="220" x2="448" y2="268" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    <!-- Pipeline -> Vault -->
    <line x1="592" y1="240" x2="448" y2="332" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    <!-- API -> Vault (file serve) -->
    <line x1="408" y1="320" x2="408" y2="360" stroke="#57534e" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
    <!-- Pipeline -> Tesseract (local OCR inside container) -->
    <line x1="612" y1="220" x2="612" y2="280" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    <!-- Pipeline -> External LLMs -->
    <line x1="660" y1="190" x2="724" y2="160" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
    <line x1="660" y1="200" x2="724" y2="240" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
    <line x1="660" y1="210" x2="724" y2="320" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>

    <!-- arrow labels with masking -->
    <rect x="234" y="152" width="36" height="12" rx="2" fill="#efeee5"/>
    <text x="252" y="161" font-family="'Geist Mono',monospace" font-size="8" fill="#65655c" text-anchor="middle" letter-spacing="0.06em">HTTP</text>

    <rect x="476" y="170" width="48" height="12" rx="2" fill="#efeee5"/>
    <text x="500" y="179" font-family="'Geist Mono',monospace" font-size="8" fill="#8E4449" text-anchor="middle" letter-spacing="0.06em">DISPATCH</text>

    <rect x="688" y="148" width="32" height="12" rx="2" fill="#efeee5"/>
    <text x="704" y="157" font-family="'Geist Mono',monospace" font-size="8" fill="#2563eb" text-anchor="middle" letter-spacing="0.06em">HTTP</text>

    <!-- ===== NODES ===== -->
    <!-- Browser -->
    <rect x="80" y="128" width="128" height="64" rx="6" fill="#faf7f2"/>
    <rect x="80" y="128" width="128" height="64" rx="6" fill="rgba(87,83,78,0.10)" stroke="#78716c" stroke-width="1"/>
    <rect x="88" y="136" width="36" height="12" rx="2" fill="transparent" stroke="rgba(120,113,108,0.40)" stroke-width="0.8"/>
    <text x="106" y="145" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(120,113,108,0.9)" text-anchor="middle" letter-spacing="0.08em">USER</text>
    <text x="144" y="170" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Browser</text>
    <text x="144" y="184" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">React UI</text>

    <!-- FastAPI Backend (focal) -->
    <rect x="296" y="128" width="152" height="80" rx="6" fill="#faf7f2"/>
    <rect x="296" y="128" width="152" height="80" rx="6" fill="rgba(142,68,73,0.10)" stroke="#8E4449" stroke-width="1.2"/>
    <rect x="304" y="136" width="40" height="12" rx="2" fill="transparent" stroke="rgba(142,68,73,0.50)" stroke-width="0.8"/>
    <text x="324" y="145" font-family="'Geist Mono',monospace" font-size="7" fill="#8E4449" text-anchor="middle" letter-spacing="0.08em">API</text>
    <text x="372" y="170" font-family="'Geist',sans-serif" font-size="13" font-weight="600" fill="#1c1917" text-anchor="middle">FastAPI Backend</text>
    <text x="372" y="186" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">REST · auth · static</text>
    <text x="372" y="200" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">python 3.12</text>

    <!-- Processing Pipeline (focal) -->
    <rect x="552" y="140" width="116" height="80" rx="6" fill="#faf7f2"/>
    <rect x="552" y="140" width="116" height="80" rx="6" fill="rgba(142,68,73,0.10)" stroke="#8E4449" stroke-width="1.2"/>
    <rect x="560" y="148" width="44" height="12" rx="2" fill="transparent" stroke="rgba(142,68,73,0.50)" stroke-width="0.8"/>

    <text x="610" y="184" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Pipeline</text>
    <text x="610" y="200" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">background</text>
    <text x="610" y="212" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">asyncio task</text>

    <!-- SQLite store -->
    <rect x="296" y="252" width="152" height="56" rx="6" fill="#faf7f2"/>
    <rect x="296" y="252" width="152" height="56" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
    <rect x="304" y="258" width="40" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.40)" stroke-width="0.8"/>
    <text x="324" y="267" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(87,83,78,0.9)" text-anchor="middle" letter-spacing="0.08em">DB</text>
    <text x="372" y="284" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">SQLite + FTS5</text>
    <text x="372" y="300" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">WAL · aiosqlite</text>

    <!-- Vault -->
    <rect x="296" y="360" width="152" height="40" rx="6" fill="#faf7f2"/>
    <rect x="296" y="360" width="152" height="40" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
    <rect x="304" y="366" width="40" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.40)" stroke-width="0.8"/>
    <text x="324" y="375" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(87,83,78,0.9)" text-anchor="middle" letter-spacing="0.08em">FILES</text>
    <text x="372" y="388" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Vault volume</text>

    <!-- Tesseract (local) -->
    <rect x="552" y="284" width="116" height="40" rx="6" fill="#faf7f2"/>
    <rect x="552" y="284" width="116" height="40" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <rect x="560" y="290" width="40" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
    <text x="580" y="299" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(28,25,23,0.8)" text-anchor="middle" letter-spacing="0.08em">OCR</text>
    <text x="610" y="312" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Tesseract 5</text>

    <!-- External: LLM, OCR, Vision -->
    <rect x="724" y="128" width="152" height="64" rx="6" fill="#faf7f2"/>
    <rect x="724" y="128" width="152" height="64" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
    <rect x="732" y="136" width="48" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>

    <text x="800" y="170" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Ollama · vLLM</text>
    <text x="800" y="184" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">claude · openai</text>

    <rect x="724" y="208" width="152" height="64" rx="6" fill="#faf7f2"/>
    <rect x="724" y="208" width="152" height="64" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
    <rect x="732" y="216" width="56" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
    <text x="760" y="225" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(28,25,23,0.7)" text-anchor="middle" letter-spacing="0.08em">VISION</text>
    <text x="800" y="248" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Vision-LLM</text>
    <text x="800" y="262" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">qwen2.5-vl · gpt-4o</text>

    <rect x="724" y="288" width="152" height="64" rx="6" fill="#faf7f2"/>
    <rect x="724" y="288" width="152" height="64" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
    <rect x="732" y="296" width="56" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
    <text x="760" y="305" font-family="'Geist Mono',monospace" font-size="7" fill="rgba(28,25,23,0.7)" text-anchor="middle" letter-spacing="0.08em">OCR</text>
    <text x="800" y="328" font-family="'Geist',sans-serif" font-size="12" font-weight="600" fill="#1c1917" text-anchor="middle">Remote OCR</text>
    <text x="800" y="342" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e" text-anchor="middle">tesseract · gvision</text>

    <!-- ===== Legend strip ===== -->
    <line x1="60" y1="448" x2="860" y2="448" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
    <text x="60" y="466" font-family="'Geist Mono',monospace" font-size="8" letter-spacing="0.14em" fill="#57534e">LEGEND</text>

    <rect x="140" y="458" width="14" height="10" rx="2" fill="rgba(142,68,73,0.10)" stroke="#8E4449"/>
    <text x="160" y="467" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e">Focal</text>

    <rect x="220" y="458" width="14" height="10" rx="2" fill="#ffffff" stroke="#1c1917"/>
    <text x="240" y="467" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e">In-container</text>

    <rect x="340" y="458" width="14" height="10" rx="2" fill="rgba(28,25,23,0.05)" stroke="#57534e"/>
    <text x="360" y="467" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e">Store / files</text>

    <rect x="460" y="458" width="14" height="10" rx="2" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)"/>
    <text x="480" y="467" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e">External service</text>

    <line x1="600" y1="463" x2="624" y2="463" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-link)"/>
    <text x="632" y="467" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e">External HTTP</text>

    <line x1="740" y1="463" x2="764" y2="463" stroke="#57534e" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
    <text x="772" y="467" font-family="'Geist Mono',monospace" font-size="9" fill="#57534e">File serve</text>

    <text x="60" y="510" font-family="'Instrument Serif',serif" font-style="italic" font-size="13" fill="#57534e">The container is one process; the pipeline is one background task inside it.</text>
  </svg>
  </div>

  <footer>ASCLEPIUS · ARCHITECTURE · 2026-04-22</footer>
</div>
</body>
</html>
