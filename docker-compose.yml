services:
  asclepius:
    image: asclepius
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ASCLEPIUS_PORT:-8070}:8000"
    volumes:
      - ${ASCLEPIUS_DATA_PATH:-./data}:/data
    environment:
      - ASCLEPIUS_VAULT_PATH=/data/vault
      - ASCLEPIUS_CONFIG_PATH=/data/config/settings.yaml
      - ASCLEPIUS_SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ASCLEPIUS_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ASCLEPIUS_GOOGLE_VISION_KEY=${GOOGLE_VISION_KEY:-}
    restart: unless-stopped
