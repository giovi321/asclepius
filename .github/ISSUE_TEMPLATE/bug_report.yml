name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. **Do not include real
        PHI or secrets in this issue.** If the problem is a security
        vulnerability, report it via
        [Security Advisories](https://github.com/giovi321/asclepius/security/advisories/new)
        instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the problem.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list of steps that trigger the problem.
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Asclepius version / commit
      placeholder: "0.6 or git sha"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Local dev (uvicorn + vite)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend logs, browser console, or network traces. Redact PHI.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This is not a security vulnerability (those go via Security Advisories).
          required: true
