version: 2
updates:
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Major-version bumps on frontend libraries are intentional migrations,
    # not background updates; a regrouped tailwind v4 / vite 8 / recharts 3
    # run pulls in real API breaks. Leave them to manual bumps.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
