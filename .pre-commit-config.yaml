repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=200"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, css, json, yaml, markdown]
        exclude: ^(docs/|CHANGELOG\.md$)

  # Regenerate the OpenAPI schema + frontend schema.ts whenever a backend
  # Python file changes, and fail if either regenerated file differs from
  # what's committed. Mirrored by the openapi-drift CI job so the check is
  # authoritative even if a contributor skips the hook (see issue #15).
  - repo: local
    hooks:
      - id: openapi-drift
        name: OpenAPI / schema.ts drift
        language: system
        entry: bash -c 'python backend/scripts/export_openapi.py && npm --prefix frontend run gen:api && git diff --exit-status -- frontend/src/openapi.json frontend/src/api/schema.ts'
        files: ^backend/.*\.py$
        pass_filenames: false
