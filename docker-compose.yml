services:
  asclepius:
    build: .
    ports:
      - "8070:8000"
    volumes:
      - ./vault:/vault
      - ./config:/config
    environment:
      - ASCLEPIUS_VAULT_PATH=/vault
      - ASCLEPIUS_CONFIG_PATH=/config/settings.yaml
      - ASCLEPIUS_SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ASCLEPIUS_OLLAMA_URL=${OLLAMA_URL:-}
      - ASCLEPIUS_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ASCLEPIUS_GOOGLE_VISION_KEY=${GOOGLE_VISION_KEY:-}
    # Remove depends_on if using external Ollama
    depends_on:
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    profiles: ["default", "no-ollama"]

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles: ["default"]
    # GPU passthrough if available:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  ollama_data:
