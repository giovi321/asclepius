<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Asclepius profile silhouette - simplified Greek god bust -->
  <!-- Hair and crown silhouette -->
  <path d="M20 28 C18 24, 17 18, 19 14 C20 11, 22 9, 25 8 C27 7, 29 7, 31 7.5 C33 7, 35 7.5, 37 9 C39 11, 40 14, 40 17 C40 20, 39 23, 38 26"
    stroke="#4a4a4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Laurel leaves (simplified crown) -->
  <path d="M22 12 C24 8, 27 7, 29 8.5" stroke="#7a2230" stroke-width="1.8" fill="none"/>
  <path d="M26 10 C28 6, 31 6, 33 8" stroke="#7a2230" stroke-width="1.8" fill="none"/>
  <path d="M31 10 C33 7, 36 7.5, 37 11" stroke="#7a2230" stroke-width="1.8" fill="none"/>

  <!-- Face outline -->
  <path d="M20 28 C20 22, 21 18, 23 16" stroke="#4a4a4a" stroke-width="2" fill="none"/>
  <path d="M38 26 C38 22, 37 18, 35 16" stroke="#4a4a4a" stroke-width="2" fill="none"/>

  <!-- Eye -->
  <ellipse cx="27" cy="20" rx="1.5" ry="1" fill="#4a4a4a"/>
  <ellipse cx="33" cy="20" rx="1.5" ry="1" fill="#4a4a4a"/>

  <!-- Nose -->
  <path d="M30 19 L29 24 L31 25" stroke="#4a4a4a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Beard -->
  <path d="M22 28 C22 32, 24 36, 28 39 C29 39.5, 30 39.8, 30 39.8 C30 39.8, 31 39.5, 32 39 C36 36, 38 32, 38 28"
    stroke="#4a4a4a" stroke-width="2" fill="none"/>
  <path d="M25 30 C26 34, 28 37, 30 39" stroke="#4a4a4a" stroke-width="1" fill="none"/>
  <path d="M35 30 C34 34, 32 37, 30 39" stroke="#4a4a4a" stroke-width="1" fill="none"/>
  <path d="M30 29 L30 39" stroke="#4a4a4a" stroke-width="1" fill="none"/>

  <!-- Shoulders / toga -->
  <path d="M22 36 C18 40, 14 44, 12 48" stroke="#4a4a4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M38 36 C42 40, 46 44, 48 48" stroke="#4a4a4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M12 48 C20 45, 30 44, 48 48" stroke="#4a4a4a" stroke-width="2" fill="none"/>

  <!-- Toga drape accent -->
  <path d="M18 42 C24 40, 34 44, 40 42" stroke="#7a2230" stroke-width="1.5" fill="none"/>

  <!-- Rod of Asclepius -->
  <line x1="50" y1="14" x2="50" y2="50" stroke="#4a4a4a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Serpent -->
  <path d="M50 46 C46 44, 54 40, 50 37 C46 34, 54 30, 50 27 C46 24, 54 20, 50 18"
    stroke="#7a2230" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Serpent head -->
  <circle cx="50" cy="15" r="2" fill="#7a2230"/>
</svg>
